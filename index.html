<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>VRM Viewer GTA Style Multiplayer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }
        canvas { display: block; cursor: crosshair; }
        #ui {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.7); color: white; padding: 15px;
            border-radius: 8px; pointer-events: auto;
            user-select: none;
            z-index: 10;
        }
        input { margin-top: 5px; }
        #error-msg {
            color: #ffaa00; margin-top: 10px; font-size: 14px; max-width: 300px; display: none;
        }
        #aim-overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 24px;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>

    <div id="ui">
        <strong>VRM Multiplayer Viewer</strong><br>
        <small>🖱️ <b>Click the screen</b> to lock mouse (look around)</small><br>
        <small>⌨️ <b>W, A, S, D</b> — move | <b>Esc</b> — unlock cursor</small><br><br>
        
        <label>Your nickname:</label><br>
        <input type="text" id="nicknameInput" value="Player"><br><br>

        <label>Load model manually:</label><br>
        <input type="file" id="fileInput" accept=".vrm">
        <div id="error-msg">Loading error. Please try using the button above.</div>
    </div>
    
    <div id="aim-overlay">+</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js"
            }
        }
    </script>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
